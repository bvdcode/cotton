name: CI

env:
  IMAGE_NAME: cotton
  CONTEXT_PATH: src
  SOURCES_PATH: Cotton.Server

on:
  push:
    paths:
      - "src/**"
      - "GitVersion.yml"
      - ".github/workflows/docker-image.yml"
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: check repository
        uses: actions/checkout@v4
        with:
          lfs: "true"
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: src/cotton.client/.nvmrc
          cache: npm
          cache-dependency-path: src/cotton.client/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore src/Cotton.sln

      - name: Install frontend dependencies
        working-directory: src/cotton.client
        run: npm ci

      - name: Run backend tests
        run: dotnet test src/Cotton.sln --configuration Release --no-restore --logger trx --results-directory TestResults

      - name: Check frontend locales
        working-directory: src/cotton.client
        run: npm run i18n:check

      - name: Run frontend tests
        working-directory: src/cotton.client
        run: npm test

      - name: Build frontend
        working-directory: src/cotton.client
        run: npm run build

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      Version: ${{ steps.gitversion.outputs.SemVer }}
      CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: check repository
        uses: actions/checkout@v4
        with:
          lfs: "true"
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: 5.x

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v3.1.11
        id: gitversion # step id used as reference for output values
      - name: Display GitVersion outputs
        run: |
          echo "Version: ${{ steps.gitversion.outputs.SemVer }}"
          echo "CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}"

      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and push docker image to Docker Hub (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_PATH }}
          push: true
          tags: |
            bvdcode/${{ env.IMAGE_NAME }}:latest
            bvdcode/${{ env.IMAGE_NAME }}:${{ steps.gitversion.outputs.semVer }}
          file: ${{ env.CONTEXT_PATH }}/${{ env.SOURCES_PATH }}/Dockerfile
          build-args: |
            BUILD_VERSION=${{ steps.gitversion.outputs.SemVer }}

      - name: Build and push docker image to Docker Hub (develop)
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_PATH }}
          push: true
          tags: |
            bvdcode/${{ env.IMAGE_NAME }}:dev
          file: ${{ env.CONTEXT_PATH }}/${{ env.SOURCES_PATH }}/Dockerfile
          build-args: |
            BUILD_VERSION=${{ steps.gitversion.outputs.SemVer }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image to GitHub Container Registry (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_PATH }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.gitversion.outputs.semVer }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          file: ${{ env.CONTEXT_PATH }}/${{ env.SOURCES_PATH }}/Dockerfile
          build-args: |
            BUILD_VERSION=${{ steps.gitversion.outputs.SemVer }}

      - name: Build and push docker image to GitHub Container Registry (develop)
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_PATH }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev
          file: ${{ env.CONTEXT_PATH }}/${{ env.SOURCES_PATH }}/Dockerfile
          build-args: |
            BUILD_VERSION=${{ steps.gitversion.outputs.SemVer }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' # only run job if on the master branch
    steps:
      - name: Create Release
        if: needs.build.outputs.CommitsSinceVersionSource > 0
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.build.outputs.Version }}
          name: Release ${{ needs.build.outputs.Version }}
          artifacts: "nupkg/*"
          token: ${{ secrets.GITHUB_TOKEN }}
